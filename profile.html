<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfilePage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <nav class="navbar">
        <a href="index.html" id="petstagram-logo">Petstagram</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="community-guidelines.html">Community Guidelines</a></li>
            <li><a href="sign-up.html">Sign up</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="profile.html">Profile</a> <!--TODO: replace profile button with img of user pfp--></li>
        </ul>
    </nav>
</header>

<main>

    <div class="profileHeader">

        <img src="exampleProfilePosts/profilePicExample.jpg" alt="profile pic" id="profilePic"/>

        <div class="profileBio">
            <h1 id="username">Test UserName</h1>
            <p id="bio">Example bio for a profile</p>
        </div>

    </div>

    <div id="profilePosts">

    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h2>Create Post</h2>

            <input type="file" id="postImage" accept="image/*" />

            <textarea id="postDescription" placeholder="Write a description..."></textarea>

            <div class="modal-buttons">
                <button id="submitPost">  Post  </button>
                <button id="closeModal">  Cancel  </button>
            </div>
        </div>
    </div>

</main>

<script>
    const username = localStorage.getItem("loggedInUser");
    const bio = localStorage.getItem("loggedInUserBio");
    const pic = localStorage.getItem("loggedInUserPic");

    if (username) {
        document.getElementById("username").textContent = username;
        if (bio) document.getElementById("bio").textContent = bio;
        if (pic) document.getElementById("profilePic").src = pic;
    } else {
        window.location.href = "login.html";
    }


    <!--will need to be changed to a fetch from database-->
    const images = ["exampleProfilePosts/profilePicExample.jpg",
        "exampleProfilePosts/profilePost1.jpg",
        "exampleProfilePosts/profilePost2.JPEG",
        "exampleProfilePosts/profilePost3.JPEG"];

    const postGrid = document.getElementById("profilePosts");
    postGrid.innerHTML = `<div class="addPostTile">
            + Add Post
        </div>`
    images.forEach((src,index) =>{
        postGrid.innerHTML +=`<img src = "${src}" alt ="${index}"/>`
    });
    
    const modal = document.getElementById("postModal");
    const closeModal = document.getElementById("closeModal");

    document.querySelector(".addPostTile").addEventListener("click", () => {
        modal.style.display = "block";
    });

    closeModal.addEventListener("click", () => {
        modal.style.display = "none";
    });

    window.addEventListener("click", (e) => {
        if (e.target === modal) {
            modal.style.display = "none";
        }
    });

    document.getElementById("submitPost").addEventListener("click", () => {
        const file = document.getElementById("postImage").files[0];
        const desc = document.getElementById("postDescription").value;

        console.log("Selected file:", file);
        console.log("Description:", desc);

        modal.style.display = "none";
    });
</script>

</body>
</html>
