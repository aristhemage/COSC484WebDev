<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" id="petstagram-logo">Petstagram</a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="community-guidelines.html">Community Guidelines</a></li>
                <li><a href="sign-up.html">Sign up</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="profileHeader">
            <img src="profilePicExample.jpg" alt="profile pic" id="profilePic"/>
            <div class="profileBio">
                <h1 id="username">Test UserName</h1>
                <p id="bio">Example bio for a profile</p>
            </div>
        </div>

        <button id="logoutBtn">Logout</button>
    </main>

    <script>
        const username = localStorage.getItem("loggedInUser");
        const bio = localStorage.getItem("loggedInUserBio");
        const pic = localStorage.getItem("loggedInUserPic");

        if(username){
            document.getElementById("username").textContent = username;
            if(bio) document.getElementById("bio").textContent = bio;
            if(pic) document.getElementById("profilePic").src = pic;
        } else {
            // If no one is logged in, redirect to login page
            window.location.href = "login.html";
        }

        // Logout button
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.clear();
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
